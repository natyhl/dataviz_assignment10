<!--// Aiming for grade A-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Popularity - Ethical Chart</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* CSS styles for the chart */
        .bar:hover {
            fill: orange;
        }
        .axis-x path,
        .axis-y path {
            fill: none;
            stroke: black;
            shape-rendering: crispEdges;
        }

        .axis-x .tick line,
        .axis-y .tick line {
            stroke: #ccc;
        }

        .axis text {
            font-size: 12px;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
        }
        .bar-label {
            font-size: 10px;
        }
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
        // Starter code: in class - Bar Chart
        // Set up the SVG container
        const svgWidth = 1200;
        const svgHeight = 600;
        const margin = { top: 60, right: 20, bottom: 80, left: 100 };
        
        const width = svgWidth - margin.left - margin.right;
        const height = svgHeight - margin.top - margin.bottom;

        const svg = d3.select("#chart-container")
            .append("svg")
            .attr("width", svgWidth)
            .attr("height", svgHeight);


        const chart = svg.append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        const tooltip = d3.select("#tooltip");

        const data = [
            { console: "PS3",      popularity: 49,   color: "#222222" },
            { console: "Xbox 360", popularity: 46,   color: "#999999" },
            { console: "Neither",  popularity: null,  color: "none"   }
        ];

            // Define X and Y scales
            const scaleX = d3.scaleBand()
                .domain(data.map(d => d.console))
                .range([0, width])
                .padding(0.4);

            const scaleY = d3.scaleLinear()
                .domain([0,100])
                .nice()
                .range([height, 0]);

            // Add X and Y axes
            chart.append("g")
                .attr("class", "axis axis-x")
                .attr("transform", `translate(0, ${height})`)
                .call(d3.axisBottom(scaleX))
                .selectAll("text");

            chart.append("g")
                .attr("class", "axis axis-y")
                .call(d3.axisLeft(scaleY).ticks(10).tickFormat(d => d + "%").tickSize(-width));

            // Add bars
            chart.selectAll(".bar")
                .data(data.filter(d => d.popularity !== null))                .enter()
                .append("rect")
                .attr("class", "bar")
                .attr("x", d => scaleX(d.console))
                .attr("y", d => scaleY(d.popularity))
                .attr("width", scaleX.bandwidth())
                .attr("height", d => height - scaleY(d.popularity))
                .attr("fill", d => d.color)

                .on("mouseover", (event, d) => {
                tooltip
                    .html(`<strong>${d.console}:</strong> ${d.popularity}%`)
                    .style("opacity", 1);
            })
            .on("mousemove", (event) => {
                tooltip
                    .style("left", (event.pageX + 12) + "px")
                    .style("top",  (event.pageY - 28) + "px");
            })
            .on("mouseleave", () => {
                tooltip.style("opacity", 0);
            });   

            // Bar labels
            chart.selectAll(".bartext") // Source: https://stackoverflow.com/questions/18057917/adding-label-on-a-d3-bar-chart?rq=3
               .data(data.filter(d => d.popularity !== null))
               .join("text") 
               .attr("class", "bar-label")
               .attr("x", d => scaleX(d.console) + scaleX.bandwidth() / 2)               
               .attr("y", d => scaleY(d.popularity) - 5)
               .attr("text-anchor", "middle")
               .text(d => d.popularity + "%");

            // Add title, http://www.d3noob.org/2013/01/adding-title-to-your-d3js-graph.html
            svg.append("text")
                .attr("x", svgWidth / 2)
                .attr("y", 30) 
                .attr("text-anchor", "middle") 
                .text("Console Popularity — Ethical Version");

            // X-axis label
            //Source: https://stackoverflow.com/questions/11189284/d3-axis-labeling
            svg.append("text")
                .attr("class", "x label")
                .attr("text-anchor", "middle")
                .attr("x", svgWidth / 2)
                .attr("y", svgHeight - 20)
                .text("Console");

            // Y-axis label
            svg.append("text")
                .attr("class", "y label")
                .attr("text-anchor", "middle")
                .attr("x", -svgHeight / 2)
                .attr("y", 8)
                .attr("dy", ".75em")
                .attr("transform", "rotate(-90)")
                .text("Popularity (in %)");
    </script>
</body>
</html>
